- id: sig-grep-credential-keywords
  name: Grep for credential keywords in filesystem
  match:
    regex: \bgrep\b.*-[rRl]*.*\b(PASSWORD|SECRET|PASSWD|api_key|api_secret|database_url|db_password|VAULT_TOKEN|DB_PASSWORD)\b
  score_floor: 12
  source: ralf_redteam
- id: sig-grep-private-key-header
  name: Grep for PEM private key headers
  match:
    regex: \bgrep\b.*BEGIN\s+(RSA\s+|OPENSSH\s+|EC\s+)?PRIVATE KEY
  score_floor: 14
  source: ralf_redteam
- id: sig-grep-bearer-token
  name: Grep for Authorization Bearer tokens in logs
  match:
    regex: \bgrep\b.*\bBearer\b|\bAuthorization:\s*Bearer\b
  score_floor: 12
  source: ralf_redteam
- id: sig-grep-history-credentials
  name: Grep shell history files for passwords
  match:
    regex: \bgrep\b.*\b(password|passwd|secret|token)\b.*\.(bash_history|zsh_history|sh_history)|\.(bash_history|zsh_history|sh_history).*\bgrep\b
  score_floor: 13
  source: ralf_redteam
- id: sig-find-xargs-ssh-keys
  name: Find SSH private key files and read via xargs
  match:
    regex: \bfind\b.*\b(id_rsa|id_ecdsa|id_ed25519|id_dsa)\b.*\bxargs\b|\bfind\b.*\.ssh.*\bxargs\b
  score_floor: 14
  source: ralf_redteam
- id: sig-find-xargs-env-files
  name: Find .env files and read via xargs cat
  match:
    regex: \bfind\b.*\.env\b.*\bxargs\b|\bfind\b.*\bxargs\b.*cat.*\.env
  score_floor: 13
  source: ralf_redteam
- id: sig-find-xargs-credential-files
  name: Find credential config files and read via xargs
  match:
    regex: \bfind\b.*\b(credentials|secrets|\.netrc|\.pgpass|\.npmrc|my\.cnf|\.my\.cnf|wp-config\.php|vault_token|\.vault-token|authorized_keys|privkey\.pem|\.tfstate)\b.*\bxargs\b
  score_floor: 14
  source: ralf_redteam
- id: sig-find-xargs-perm600-keys
  name: Find perm-600 files and harvest private keys via xargs
  match:
    regex: \bfind\b.*-perm\s+6?0?0\b.*\b(id_|BEGIN|PRIVATE)\b.*\bxargs\b|\bfind\b.*-perm\s+6?0?0\b.*\bxargs\b.*\bgrep\b.*PRIVATE
  score_floor: 13
  source: ralf_redteam
- id: sig-find-xargs-secret-names
  name: Find files by secret-indicative names via xargs
  match:
    regex: \bfind\b.*\*(secret|credential|token|password)\*.*\bxargs\b|\bfind\b.*-name.*\*(secret|token)\*.*\bxargs\b
  score_floor: 12
  source: ralf_redteam
- id: sig-cat-pgpass
  name: Direct read of .pgpass database password file
  match:
    regex: \bcat\b.*\.pgpass\b|<\s*~?/\.pgpass\b
  score_floor: 13
  source: ralf_redteam
- id: sig-cat-npmrc
  name: Direct read of .npmrc registry auth token
  match:
    regex: \bcat\b.*\.npmrc\b
  score_floor: 12
  source: ralf_redteam
- id: sig-cat-mycnf
  name: Direct read of MySQL credential files
  match:
    regex: \bcat\b.*(my\.cnf|\.my\.cnf)\b
  score_floor: 13
  source: ralf_redteam
- id: sig-cat-ssl-privkey
  name: Direct read of SSL/TLS private key
  match:
    regex: \bcat\b.*/etc/letsencrypt/.*privkey|cat.*\.pem\b.*private|cat.*privkey\.pem
  score_floor: 14
  source: ralf_redteam
- id: sig-find-xargs-conf-password
  name: Find config files and grep for password fields via xargs
  match:
    regex: \bfind\b.*\.(conf|cfg|ini)\b.*\bxargs\b.*\bgrep\b.*password|\bfind\b.*\b(conf|cfg|ini)\b.*\bxargs\b.*grep.*pass
  score_floor: 12
  source: ralf_redteam
