version: 2
rules:
- id: sig-shell-in-args
  name: Shell binary in command arguments
  match:
    regex: (?:^|\s|['";,=({])(?:/bin/(?:sh|bash|zsh|dash|csh|tcsh|ksh|ash)|/usr/bin/(?:sh|bash|zsh))
  score_floor: 8
  source: ralf_redteam
- id: sig-shell-dropper
  name: Shell path written to file (dropper)
  match:
    regex: /bin/(?:sh|bash).*>\s*/\S+
  score_floor: 10
  source: ralf_redteam
- id: sig-interactive-escape
  name: Interactive tool shell escape
  match:
    regex: '[!:]\s*(?:/bin/)?(?:sh|bash|shell)'
  score_floor: 10
  source: ralf_redteam
- id: sig-exec-call-shell
  name: Exec/system call spawning shell
  match:
    regex: \b(?:exec|system|passthru|popen|spawn|shell_exec)\s*\(?\s*['"].*(?:/bin/(?:sh|bash)|/bin/sh)
  score_floor: 10
  source: ralf_redteam
- id: sig-package-json-inject
  name: npm package.json script injection
  match:
    contains: package.json
    regex: (?:preinstall|postinstall|prepare|scripts).*(?:/bin/sh|/bin/bash|sh\b)
  score_floor: 12
  source: ralf_redteam
- id: sig-sensitive-network
  name: Sensitive file with network connection
  match:
    regex: (?:/etc/shadow|/etc/passwd|/root/\.ssh|credentials|\.kube/config)
    contains_any:
    - attacker
    - evil.com
    - 10.0.0.
  score_floor: 12
  source: ralf_redteam
- id: sig-ld-injection
  name: Shared library injection (LD_PRELOAD/ldconfig)
  match:
    contains_any:
    - LD_PRELOAD
    - ldconfig
    - ld.so.preload
    - .so
    regex: (?:>|>>|echo|export).*(?:\.so|ldconfig|ld\.so)
  score_floor: 12
  source: ralf_redteam
- id: sig-build-file-inject
  name: Build file shell injection
  match:
    regex: (?:Gemfile|Rakefile|Makefile|CMakeLists|setup\.py|pyproject\.toml).*(?:/bin/sh|system|exec|spawn)
  score_floor: 10
  source: ralf_redteam
- id: lr-imds-aws
  name: AWS IMDS credential theft
  match:
    contains_any:
    - 169.254.169.254
    - 169.254.170.2
  score_floor: 12
  source: ralf_redteam
- id: lr-imds-gcp
  name: GCP metadata credential theft
  match:
    contains: metadata.google.internal
  score_floor: 12
  source: ralf_redteam
- id: lr-imds-azure
  name: Azure IMDS credential theft
  match:
    contains: /metadata/identity/oauth2
  score_floor: 12
  source: ralf_redteam
- id: lr-container-privileged
  name: Privileged container escape
  match:
    contains: --privileged
  score_floor: 12
  source: ralf_redteam
- id: lr-container-proc1
  name: PID 1 namespace leak
  match:
    contains_any:
    - /proc/1/environ
    - /proc/1/root
    - /proc/sched_debug
  score_floor: 12
  source: ralf_redteam
- id: lr-container-docker-sock
  name: Docker socket mount
  match:
    contains: docker.sock
  score_floor: 12
  source: ralf_redteam
- id: lr-container-runc
  name: runc exec escape
  match:
    regex: \brunc\s+exec\b
  score_floor: 12
  source: ralf_redteam
- id: lr-history-evasion
  name: Shell history evasion
  match:
    regex: \bhistory\s+-c\b|unset\s+HISTFILE|HISTSIZE=0|HISTFILESIZE=0
  score_floor: 6
  source: ralf_redteam
- id: lr-http-serve-sensitive
  name: HTTP serve sensitive directory
  match:
    regex: http\.server\s+.*--directory\s+/(?:etc|root|home|var|proc)
  score_floor: 10
  source: ralf_redteam
- id: lr-cred-jenkins
  name: Jenkins secrets access
  match:
    contains_any:
    - /var/lib/jenkins/secrets/master.key
    - /var/lib/jenkins/secrets/initialAdminPassword
  score_floor: 8
  source: ralf_redteam
- id: lr-cred-k8s-token
  name: Kubernetes service account token
  match:
    contains_any:
    - /var/run/secrets/kubernetes.io/serviceaccount/token
    - /run/secrets/kubernetes.io/serviceaccount/token
  score_floor: 8
  source: ralf_redteam
- id: lr-cred-git
  name: Git credentials file
  match:
    contains: .git-credentials
  score_floor: 8
  source: ralf_redteam
- id: lr-bind-shell
  name: Network bind shell
  match:
    regex: \b(?:nc|ncat|netcat|busybox\s+nc)\s+.*-[lL].*-e\s
  score_floor: 12
  source: ralf_redteam
- id: lr-sysctl-traversal
  name: sysctl path traversal read
  match:
    binary:
    - sysctl
    contains: /../
  score_floor: 10
  source: gtfobins_round_4b
- id: lr-node-child-spawn
  name: Node.js child_process.spawn shell
  match:
    binary:
    - node
    contains: child_process
  score_floor: 10
  source: gtfobins_round_4b
- id: lr-pipe-exfil
  name: Credential pipe to network exfil
  match:
    regex: (?:cat|head|tail|strings|base64|xxd|dd\s+if=)\s+(/\S+).*\|\s*(?:nc|ncat|netcat|curl|wget|socat)\s
  score_floor: 15
  source: ralf_redteam
- id: lr-shell-escape
  name: Interactive shell escape
  match:
    regex: \b(?:less|more|man|vim|vi|view|nmap)\b.*[\n;]\s*!(?:/bin/)?(?:bash|sh|zsh|dash)
  score_floor: 10
  source: ralf_redteam
- id: lr-interp-exec
  name: Interpreter exec shell spawn
  match:
    regex: \b(?:ruby|perl)\s+-e\s+.*(?:exec|system)\s*[\('"]+\s*/bin/(?:sh|bash)
  score_floor: 8
  source: ralf_redteam
